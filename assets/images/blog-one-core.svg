<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>One core, many platforms</title>
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#252527"/>
    </pattern>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FA7343" opacity="0.85"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a1b"/>
  <rect width="800" height="400" fill="url(#dots)" opacity="0.7"/>

  <!-- Title -->
  <text x="400" y="40"
        font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="18" font-weight="700" fill="#e0e0e0" letter-spacing="0.5"
        text-anchor="middle">One core, many platforms</text>

  <!-- Core glow -->
  <ellipse cx="400" cy="118" rx="150" ry="60" fill="#FFD057" opacity="0.06"/>

  <!-- Arrows: core -> shells (today, solid) -->
  <line x1="385" y1="146" x2="120" y2="280" stroke="#FA7343" stroke-width="1.5" opacity="0.6" marker-end="url(#arr-orange)"/>
  <line x1="392" y1="146" x2="260" y2="280" stroke="#FA7343" stroke-width="1.5" opacity="0.6" marker-end="url(#arr-orange)"/>

  <!-- Arrows: core -> shells (planned, dashed dim) -->
  <line x1="408" y1="146" x2="540" y2="280" stroke="#555" stroke-width="1.5" stroke-dasharray="7 5" marker-end="url(#arr-dim)"/>
  <line x1="415" y1="146" x2="680" y2="280" stroke="#555" stroke-width="1.5" stroke-dasharray="7 5" marker-end="url(#arr-dim)"/>
  <line x1="400" y1="146" x2="400" y2="280" stroke="#555" stroke-width="1.5" stroke-dasharray="7 5" marker-end="url(#arr-dim)"/>

  <!-- Core box -->
  <rect x="300" y="84" width="200" height="62" rx="10"
        fill="#191508" stroke="#FFD057" stroke-width="1.5"/>
  <text x="400" y="112"
        font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="20" font-weight="600" fill="#FFD057" text-anchor="middle">core</text>
  <text x="400" y="132"
        font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="11" fill="#FFD057" opacity="0.6" text-anchor="middle">one worklet, one schema</text>

  <!-- Shell nodes -->
  <!-- macOS (today) -->
  <rect x="55" y="284" width="130" height="58" rx="10" fill="#180d07" stroke="#FA7343" stroke-width="1.5"/>
  <text x="120" y="310" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#FA7343" text-anchor="middle">macOS</text>
  <text x="120" y="328" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="10" fill="#FA7343" opacity="0.6" text-anchor="middle">Swift - today</text>

  <!-- iOS (today) -->
  <rect x="195" y="284" width="130" height="58" rx="10" fill="#180d07" stroke="#FA7343" stroke-width="1.5"/>
  <text x="260" y="310" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#FA7343" text-anchor="middle">iOS</text>
  <text x="260" y="328" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="10" fill="#FA7343" opacity="0.6" text-anchor="middle">Swift - today</text>

  <!-- Linux (next) -->
  <rect x="335" y="284" width="130" height="58" rx="10" fill="#141415" stroke="#555" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="400" y="310" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#999" text-anchor="middle">Linux</text>
  <text x="400" y="328" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="10" fill="#777" text-anchor="middle">C / C++ - next</text>

  <!-- Windows (next) -->
  <rect x="475" y="284" width="130" height="58" rx="10" fill="#141415" stroke="#555" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="540" y="310" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#999" text-anchor="middle">Windows</text>
  <text x="540" y="328" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="10" fill="#777" text-anchor="middle">C / C++ - next</text>

  <!-- Android (planned) -->
  <rect x="615" y="284" width="130" height="58" rx="10" fill="#141415" stroke="#555" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="680" y="310" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="15" font-weight="600" fill="#999" text-anchor="middle">Android</text>
  <text x="680" y="328" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="10" fill="#777" text-anchor="middle">Kotlin - planned</text>
</svg>
