<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 1584px;
        height: 396px;
        overflow: hidden;
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at 1.5px 1.5px, hsla(0, 0%, 100%, 0.05) 1.5px, transparent 1.6px) 0 0 / 38px 38px,
          linear-gradient(160deg, hsl(240, 1%, 18%) 0%, hsl(240, 3%, 9%) 100%);
        font-family: "Poppins", "Helvetica Neue", Arial, sans-serif;
        color: hsl(0, 0%, 90%);
      }

      /* gold glow, pulled toward center-right so it doesn't sit under the avatar */
      body::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 58%;
        width: 760px;
        height: 760px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, hsla(45, 100%, 72%, 0.10) 0%, transparent 60%);
        pointer-events: none;
      }

      /* content block: centered vertically, nudged right of center to clear
         the LinkedIn profile photo that overlaps the bottom-left corner */
      .wrap {
        position: absolute;
        top: 50%;
        left: 58%;
        transform: translate(-50%, -50%);
        text-align: center;
      }

      .name {
        font-size: 64px;
        font-weight: 600;
        color: hsl(0, 0%, 98%);
        letter-spacing: 1px;
        line-height: 1.1;
      }

      .rule {
        width: 240px;
        height: 5px;
        border-radius: 3px;
        background: linear-gradient(90deg, hsl(45, 100%, 72%), hsl(35, 100%, 68%));
        margin: 16px auto 16px;
      }

      .role {
        font-family: ui-monospace, "SF Mono", "Menlo", monospace;
        font-size: 20px;
        letter-spacing: 3px;
        color: hsl(0, 0%, 90%);
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 18px;
      }

      .role .sep {
        align-self: center;
        flex: 0 0 auto;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: hsl(45, 100%, 72%);
        opacity: 0.8;
      }

      .role .barelogo {
        height: 25px;
        width: auto;
        display: block;
        fill: hsl(45, 100%, 72%);
      }

      .domain {
        position: absolute;
        bottom: 26px;
        right: 44px;
        font-family: ui-monospace, "SF Mono", "Menlo", monospace;
        font-size: 16px;
        letter-spacing: 4px;
        color: hsl(0, 0%, 52%);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="name">Bala Avulapati</div>

    </div>
    <div class="domain">bavulapati.com</div>
  </body>
</html>
