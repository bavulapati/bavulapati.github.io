<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121212" />
    <title>404 - Page not found | Bala Avulapati</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16.png" />
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: "Poppins", "Helvetica Neue", Arial, sans-serif;
        background-color: hsl(0, 0%, 7%);
        color: hsl(0, 0%, 84%);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .code {
        font-size: 72px;
        font-weight: 600;
        color: hsl(0, 0%, 98%);
        letter-spacing: 2px;
      }
      .rule {
        width: 64px;
        height: 4px;
        border-radius: 2px;
        background: hsl(45, 100%, 72%);
        margin: 16px auto 20px;
      }
      p { font-size: 16px; margin-bottom: 24px; }
      a { color: hsl(45, 100%, 72%); text-decoration: none; font-weight: 500; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <div class="rule"></div>
      <p>This page does not exist.</p>
      <a href="/">&larr; Back to bavulapati.com</a>
    </main>
    <!-- analytics: GoatCounter - self-hosted count.js + first-party endpoint (stats.bavulapati.com) so ad blockers don't drop it; no cookies -->
    <script
      data-goatcounter="https://stats.bavulapati.com/count"
      async
      src="/assets/js/count.js"
    ></script>
  </body>
