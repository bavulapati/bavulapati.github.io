name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-xml:
    name: XML well-formed (feed + sitemap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - run: xmllint --noout feed.xml sitemap.xml

  check-links:
    name: Internal links and assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir ${{ github.workspace }} index.html 'blog/*.html'
          fail: true

  validate-html:
    name: HTML validation (W3C Nu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install --quiet html5validator
      - run: html5validator --root .
